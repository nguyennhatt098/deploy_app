apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-sa
  namespace: elasticsearch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-cr
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-crb
subjects:
  - kind: ServiceAccount
    name: promtail-sa
    namespace: elasticsearch
roleRef:
  kind: ClusterRole
  name: promtail-cr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: elasticsearch
data:
  config.yml: |
    server:
      http_listen_port: 9080
    clients:
      - url: http://10.43.148.211:3100/loki/api/v1/push
    scrape_configs:
    - job_name: kubernetes-pods-new
      pipeline_stages:
        - docker: {} # K3s thường dùng format docker cho log pods
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        - action: replace
          replacement: /var/log/pods/*/*/*.log
          target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: elasticsearch
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail-sa
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args: ["-config.file=/etc/promtail/config.yml"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: logs
              mountPath: /var/log/pods
              readOnly: true
            - name: config
              mountPath: /etc/promtail
      volumes:
        - name: logs
          hostPath:
            path: /var/log/pods
        - name: config
          configMap:
            name: promtail-config