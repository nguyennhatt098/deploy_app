apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-sa
  namespace: elasticsearch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-cr
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-crb
subjects:
  - kind: ServiceAccount
    name: promtail-sa
    namespace: elasticsearch
roleRef:
  kind: ClusterRole
  name: promtail-cr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: elasticsearch
data:
  config.yml: |
    server:
      http_listen_port: 9080
      log_level: info

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki-service:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods-hft

        pipeline_stages:
          - cri: {}

        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods-hft
              __path__: /var/log/pods/*/*/*.log

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: elasticsearch
spec:
  selector:
    matchLabels:
      app: promtail

  template:
    metadata:
      labels:
        app: promtail

    spec:
      serviceAccountName: promtail-sa
      terminationGracePeriodSeconds: 10

      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - -config.file=/etc/promtail/config.yml

          securityContext:
            runAsUser: 0
            privileged: true

          volumeMounts:
            - name: logs
              mountPath: /var/log/pods
              readOnly: true

            - name: varlog
              mountPath: /var/log
              readOnly: true

            - name: config
              mountPath: /etc/promtail

            # ✅ FIX QUAN TRỌNG
            - name: positions
              mountPath: /run/promtail

      volumes:
        - name: logs
          hostPath:
            path: /var/log/pods

        - name: varlog
          hostPath:
            path: /var/log

        - name: config
          configMap:
            name: promtail-config

        # ✅ FIX QUAN TRỌNG
        - name: positions
          emptyDir: {}