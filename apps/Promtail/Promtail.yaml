---
# 1. TẠO SERVICE ACCOUNT
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-sa
  namespace: elasticsearch
---
# 2. CẤP QUYỀN (CLUSTER ROLE)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-cr
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
# 3. GẮN QUYỀN VÀO ACCOUNT
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-crb
subjects:
  - kind: ServiceAccount
    name: promtail-sa
    namespace: elasticsearch
roleRef:
  kind: ClusterRole
  name: promtail-cr
  apiGroup: rbac.authorization.k8s.io
---
# 4. CẤU HÌNH PROMTAIL (CONFIGMAP) - ĐÃ FIX LỖI CÚ PHÁP
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: elasticsearch
data:
  config.yml: |
    server:
      http_listen_port: 9080
    clients:
      - url: http://loki-service:3100/loki/api/v1/push
    scrape_configs:
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
        # Gán các nhãn để lọc trên Grafana
        - source_labels: [__meta_kubernetes_pod_label_app]
          target_label: app
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container

        # QUY TẮC ĐƯỜNG DẪN: Ghép chuẩn theo cấu trúc /var/log/pods/NS_POD_UID/CONTAINER/*.log
        - source_labels: 
            - __meta_kubernetes_namespace
            - __meta_kubernetes_pod_name
            - __meta_kubernetes_pod_uid
            - __meta_kubernetes_pod_container_name
          separator: _
          action: replace
          replacement: /var/log/pods/$1_$2_$3/$4/*.log
          target_label: __path__
---
# 5. BỘ CHẠY PROMTAIL (DAEMONSET)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: elasticsearch
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail-sa
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args: ["-config.file=/etc/promtail/config.yml"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: logs
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers # Thêm mount này nếu cái trên vẫn lỗi
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /etc/promtail
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: logs
          hostPath:
            path: /var/log/pods
        - name: config
          configMap:
            name: promtail-config