apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args:
            - "-config.file=/etc/loki/local-config.yaml"
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-data
          emptyDir: {} # Có thể thay bằng PVC nếu muốn lưu log lâu dài
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
  namespace: elasticsearch
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100